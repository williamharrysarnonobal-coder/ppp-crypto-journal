<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot password — Tanaydana</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="img/forgefolio-logo.png">
<link rel="apple-touch-icon" href="img/forgefolio-logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tanaydana">
<meta name="theme-color" content="#12141C">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/style.css?v=9">
</head>
<body class="auth-page">

<header class="site-header">
  <span class="brand-mark">
    <img src="img/Forgefolio-removebg-preview.png" alt="Tanaydana" class="brand-logo-img brand-logo-img-lg">
    <span class="site-header-name">Tanaydana</span>
  </span>
</header>

<div class="auth-page-center">
<div class="auth-card">
  <h1>Forgot password?</h1>
  <p>Enter your username and we'll email a password reset link to the address on file.</p>

  <label>Username</label>
  <input id="forgotUsername" placeholder="e.g. juandelacruz" autocapitalize="off" autocorrect="off">

  <button id="forgotBtn">Send reset link</button>
  <div id="forgotError" class="auth-error"></div>
  <div id="forgotNotice" class="auth-notice"></div>

  <div class="auth-switch"><a href="login.html">Back to log in</a></div>
</div>
</div>

<footer class="site-footer">© 2026 Tanaydana. All rights reserved.</footer>

<script src="js/supabase.js"></script>
<script src="js/auth.js?v=1"></script>
<script>
redirectIfLoggedIn("dashboard.html");

async function doForgotPassword(){
  const username = document.getElementById('forgotUsername').value.trim().toLowerCase();
  const errEl = document.getElementById('forgotError');
  const noticeEl = document.getElementById('forgotNotice');
  const btn = document.getElementById('forgotBtn');
  errEl.textContent = '';
  noticeEl.textContent = '';

  if(!username){
    errEl.textContent = "Please enter your username.";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Sending…";
  try{
    await authForgotPassword(username);
    noticeEl.textContent = "If that username exists, a password reset link has been sent to its email. Check your inbox.";
  }catch(e){
    errEl.textContent = e.message || "Couldn't send reset link.";
  }finally{
    btn.disabled = false;
    btn.textContent = "Send reset link";
  }
}

document.getElementById('forgotBtn').addEventListener('click', doForgotPassword);
document.getElementById('forgotUsername').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') doForgotPassword();
});
</script>
</body>
</html>
