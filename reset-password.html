<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — Forgefolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/style.css?v=8">
</head>
<body class="auth-page">

<header class="site-header">
  <span class="brand-mark">
    <img src="img/Forgefolio-removebg-preview.png" alt="Forgefolio" class="brand-logo-img brand-logo-img-lg">
    <span class="site-header-name">Forgefolio</span>
  </span>
</header>

<div class="auth-page-center">
<div class="auth-card">
  <h1>Set a new password</h1>
  <p id="resetIntro">Enter your new password below.</p>

  <div id="resetFormFields">
    <label>New Password</label>
    <input id="resetPassword" type="password" placeholder="At least 6 characters">

    <label>Confirm Password</label>
    <input id="resetPasswordConfirm" type="password" placeholder="Retype your new password">

    <button id="resetBtn">Update password</button>
  </div>
  <div id="resetError" class="auth-error"></div>
  <div id="resetNotice" class="auth-notice"></div>

  <div class="auth-switch"><a href="login.html">Back to log in</a></div>
</div>
</div>

<footer class="site-footer">© 2026 Forgefolio. All rights reserved.</footer>

<script src="js/supabase.js"></script>
<script src="js/auth.js?v=1"></script>
<script>
// The reset link's recovery token is in the URL — supabase-js auto-detects
// it (detectSessionInUrl defaults to true) and establishes a temporary
// recovery session. If none was found, there's no valid link to act on.
(async function checkRecoverySession(){
  const { data: { session } } = await sb.auth.getSession();
  if(!session){
    document.getElementById('resetIntro').textContent = "This reset link is invalid or has expired.";
    document.getElementById('resetFormFields').style.display = 'none';
  }
})();

async function doResetPassword(){
  const password = document.getElementById('resetPassword').value;
  const confirmPassword = document.getElementById('resetPasswordConfirm').value;
  const errEl = document.getElementById('resetError');
  const noticeEl = document.getElementById('resetNotice');
  const btn = document.getElementById('resetBtn');
  errEl.textContent = '';
  noticeEl.textContent = '';

  if(!password || !confirmPassword){
    errEl.textContent = "Please fill in both fields.";
    return;
  }
  if(password.length < 6){
    errEl.textContent = "Password must be at least 6 characters.";
    return;
  }
  if(password !== confirmPassword){
    errEl.textContent = "Passwords don't match.";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Updating…";
  try{
    await authUpdatePassword(password);
    noticeEl.textContent = "Password updated! Redirecting to log in…";
    document.getElementById('resetFormFields').style.display = 'none';
    await sb.auth.signOut();
    setTimeout(() => { window.location.href = "login.html"; }, 1800);
  }catch(e){
    errEl.textContent = e.message || "Couldn't update password.";
  }finally{
    btn.disabled = false;
    btn.textContent = "Update password";
  }
}

document.getElementById('resetBtn').addEventListener('click', doResetPassword);
document.getElementById('resetPasswordConfirm').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') doResetPassword();
});
</script>
</body>
</html>
