<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — Tanaydana</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="img/forgefolio-logo.png">
<link rel="apple-touch-icon" href="img/forgefolio-logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tanaydana">
<meta name="theme-color" content="#12141C">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/style.css?v=9">
</head>
<body class="auth-page">

<header class="site-header">
  <span class="brand-mark">
    <img src="img/Forgefolio-removebg-preview.png" alt="Tanaydana" class="brand-logo-img brand-logo-img-lg">
    <span class="site-header-name">Tanaydana</span>
  </span>
</header>

<div class="auth-page-center">
<div class="auth-card">
  <h1>Create your account</h1>
  <p>Set up your Tanaydana login.</p>

  <label>Full Name</label>
  <input id="signupFullName" placeholder="Juan Dela Cruz">

  <label>Username</label>
  <input id="signupUsername" placeholder="e.g. juandelacruz" autocapitalize="off" autocorrect="off">

  <label>Discord Username</label>
  <input id="signupDiscord" placeholder="e.g. juandelacruz#0001 (optional)">

  <label>Email</label>
  <input id="signupEmail" type="email" placeholder="you@example.com">

  <label>Password</label>
  <input id="signupPassword" type="password" placeholder="At least 6 characters">

  <button id="signupBtn">Sign up</button>
  <div id="signupError" class="auth-error"></div>
  <div id="signupNotice" class="auth-notice"></div>

  <div class="auth-switch">Already have an account? <a href="login.html">Log in</a></div>
</div>
</div>

<footer class="site-footer">© 2026 Tanaydana. All rights reserved.</footer>

<script src="js/supabase.js"></script>
<script src="js/auth.js?v=1"></script>
<script>
redirectIfLoggedIn("dashboard.html");

async function doSignup(){
  const fullName = document.getElementById('signupFullName').value.trim();
  const username = document.getElementById('signupUsername').value.trim().toLowerCase();
  const discord = document.getElementById('signupDiscord').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const errEl = document.getElementById('signupError');
  const noticeEl = document.getElementById('signupNotice');
  const btn = document.getElementById('signupBtn');
  errEl.textContent = '';
  noticeEl.textContent = '';

  if(!fullName || !username || !email || !password){
    errEl.textContent = "Please fill in Full Name, Username, Email, and Password.";
    return;
  }
  if(!/^[a-z0-9_.]{3,20}$/.test(username)){
    errEl.textContent = "Username must be 3-20 characters: lowercase letters, numbers, underscore, or period only.";
    return;
  }
  if(password.length < 6){
    errEl.textContent = "Password must be at least 6 characters.";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Creating account…";
  try{
    const data = await authSignUp(email, password, {
      display_name: fullName,
      username: username,
      discord_username: discord || null
    });
    if(data.session){
      window.location.href = "dashboard.html";
    }else{
      noticeEl.textContent = "Account created! Check your email to confirm before logging in.";
    }
  }catch(e){
    errEl.textContent = e.message?.includes('duplicate') || e.message?.includes('username')
      ? "That username is already taken — please pick another."
      : (e.message || "Couldn't create account.");
  }finally{
    btn.disabled = false;
    btn.textContent = "Sign up";
  }
}

document.getElementById('signupBtn').addEventListener('click', doSignup);
document.getElementById('signupPassword').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') doSignup();
});
</script>
</body>
</html>
