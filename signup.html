<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — Trading Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

<div class="auth-card">
  <h1>Create your account</h1>
  <p>Set up your trading journal login.</p>

  <label>Email</label>
  <input id="signupEmail" type="email" placeholder="you@example.com">

  <label>Password</label>
  <input id="signupPassword" type="password" placeholder="At least 6 characters">

  <button id="signupBtn">Sign up</button>
  <div id="signupError" class="auth-error"></div>
  <div id="signupNotice" class="auth-notice"></div>

  <div class="auth-switch">Already have an account? <a href="login.html">Log in</a></div>
</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
redirectIfLoggedIn("dashboard.html");

async function doSignup(){
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const errEl = document.getElementById('signupError');
  const noticeEl = document.getElementById('signupNotice');
  const btn = document.getElementById('signupBtn');
  errEl.textContent = '';
  noticeEl.textContent = '';

  if(!email || !password){
    errEl.textContent = "Please fill in both fields.";
    return;
  }
  if(password.length < 6){
    errEl.textContent = "Password must be at least 6 characters.";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Creating account…";
  try{
    const data = await authSignUp(email, password);
    if(data.session){
      window.location.href = "dashboard.html";
    }else{
      noticeEl.textContent = "Account created! Check your email to confirm before logging in.";
    }
  }catch(e){
    errEl.textContent = e.message || "Couldn't create account.";
  }finally{
    btn.disabled = false;
    btn.textContent = "Sign up";
  }
}

document.getElementById('signupBtn').addEventListener('click', doSignup);
document.getElementById('signupPassword').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') doSignup();
});
</script>
</body>
</html>
